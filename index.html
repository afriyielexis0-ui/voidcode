<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VoidCode Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f10; color: #aaa; font-family: monospace; padding: 20px; font-size: 12px; }
    .line { margin: 4px 0; }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    .info { color: #a78bfa; }
  </style>
</head>
<body>
  <div id="log"></div>
  <script>
    function log(msg, cls) {
      const d = document.createElement('div');
      d.className = 'line ' + (cls||'');
      d.textContent = new Date().toISOString().slice(11,23) + ' ' + msg;
      document.getElementById('log').appendChild(d);
    }

    log('Page loaded', 'ok');
    log('window.opener = ' + window.opener, 'info');

    if (window.opener) {
      log('Sending VOIDCODE_READY to opener...', 'info');
      window.opener.postMessage({ type: 'VOIDCODE_READY' }, '*');
      log('Sent!', 'ok');
    } else {
      log('NO OPENER — opened directly, not via extension', 'err');
    }

    window.addEventListener('message', (e) => {
      log('Message received from: ' + e.origin, 'ok');
      log('Data: ' + JSON.stringify(e.data).slice(0, 200), 'ok');
    });

    log('Listening for messages...', 'info');
  </script>
</body>
</html>
