<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VoidCode Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: monospace; }
    #output { width: 100%; height: 100%; border: none; display: block; }
    #status {
      position: fixed; top: 0; left: 0; right: 0;
      background: #111; color: #0f0; font-size: 13px;
      padding: 6px 12px; z-index: 999;
      display: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #status.visible { display: block; }
    #status.error { color: #f55; background: #1a0000; }
  </style>
</head>
<body>
  <div id="status"></div>
  <iframe id="output" sandbox="allow-scripts allow-forms allow-modals allow-popups allow-same-origin"></iframe>

  <script type="module">
    const statusEl = document.getElementById('status');
    const iframe = document.getElementById('output');

    function showStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = 'visible' + (isError ? ' error' : '');
      console.log('[VoidCode Runner]', msg);
    }
    function hideStatus() {
      statusEl.className = '';
    }

    // ── Plain HTML render ────────────────────────────────────────────────────
    function renderHTML(html) {
      iframe.removeAttribute('sandbox');
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write(html);
      doc.close();
      hideStatus();
    }

    // ── Framework project via WebContainer ───────────────────────────────────
    async function runFramework(files) {
      showStatus('⏳ Booting WebContainer…');
      try {
        const { WebContainer } = await import('https://esm.sh/@webcontainer/api');
        const wc = await WebContainer.boot();

        showStatus('📦 Mounting files…');
        await wc.mount(files);

        showStatus('📥 Installing dependencies…');
        const install = await wc.spawn('npm', ['install']);
        install.output.pipeTo(new WritableStream({
          write(chunk) { showStatus('📥 ' + chunk.trim().slice(0, 100)); }
        }));
        const installCode = await install.exit;
        if (installCode !== 0) {
          showStatus('❌ npm install failed (exit ' + installCode + ')', true);
          return;
        }

        showStatus('🚀 Starting dev server…');
        const dev = await wc.spawn('npm', ['run', 'dev']);
        dev.output.pipeTo(new WritableStream({
          write(chunk) { showStatus('🚀 ' + chunk.trim().slice(0, 100)); }
        }));

        wc.on('server-ready', (port, url) => {
          showStatus('✅ Running on ' + url);
          setTimeout(hideStatus, 3000);
          iframe.removeAttribute('sandbox');
          iframe.src = url;
        });
      } catch (err) {
        showStatus('❌ WebContainer error: ' + err.message, true);
        console.error('[VoidCode Runner] WebContainer error:', err);
      }
    }

    // ── Message listener ─────────────────────────────────────────────────────
    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (!msg?.type) return;
      console.log('[VoidCode Runner] received:', msg.type, msg.html ? 'html=' + msg.html.length : '', msg.files ? 'files=' + Object.keys(msg.files).length : '');
      if (msg.type === 'VOIDCODE_RUN') {
        if (msg.html) {
          renderHTML(msg.html);
        } else if (msg.files) {
          runFramework(msg.files);
        } else {
          showStatus('❌ VOIDCODE_RUN received but no html or files', true);
        }
      }
    });

    // ── Signal ready to extension ────────────────────────────────────────────
    function signalReady() {
      const msg = { type: 'VOIDCODE_READY' };
      if (window.opener) {
        try { window.opener.postMessage(msg, '*'); } catch(_) {}
      }
    }
    signalReady();
    setTimeout(signalReady, 500);
    setTimeout(signalReady, 1500);

    console.log('[VoidCode Runner] Ready. opener:', !!window.opener);
  </script>
</body>
</html>
