<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VoidCode Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <iframe id="output" sandbox="allow-scripts allow-forms allow-modals allow-popups allow-same-origin"></iframe>
  <script>
    const EXTENSION_ORIGINS = [
      // Chrome/Firefox extension origins are like chrome-extension://... or moz-extension://...
      // We can't know the exact ID, so accept any extension origin + the panel itself
    ];

    function render(html) {
      const iframe = document.getElementById('output');
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write(html);
      doc.close();
    }

    function renderFiles(files) {
      // For framework projects sent as file trees — build a simple index loader
      // For now, find index.html and render it
      const entry = files['index.html'] || files[Object.keys(files).find(k => k.endsWith('index.html'))];
      if (entry) {
        render(typeof entry === 'string' ? entry : entry.content || '');
      }
    }

    // Listen for messages from the extension panel
    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (!msg || !msg.type) return;

      if (msg.type === 'VOIDCODE_RUN') {
        if (msg.html) {
          render(msg.html);
        } else if (msg.files) {
          renderFiles(msg.files);
        }
      }
    });

    // Signal to the extension panel that we're ready
    // Use opener if available (tab opened via window.open)
    // Also send via broadcast so any listening panel gets it
    function signalReady() {
      const msg = { type: 'VOIDCODE_READY' };

      // Primary: opener reference (when extension opened this tab)
      if (window.opener) {
        try { window.opener.postMessage(msg, '*'); } catch(_) {}
      }

      // Also try posting to all frames — extension panel may be in a different context
      // The extension listens on its own window, so opener is the right path.
      // If opener is null (tab was pre-opened), we can't push — but the extension
      // will detect alreadyLoaded and send directly without waiting for READY.
    }

    // Signal immediately + after a short delay as backup
    signalReady();
    setTimeout(signalReady, 500);
    setTimeout(signalReady, 1500);
  </script>
</body>
</html>
